name = "caijing-showcase-site"
compatibility_date = "2025-08-01"
pages_build_output_dir = "out"

# Cloudflare Pages UI 內也要設定同名 binding：
# D1 binding: DB
# R2 binding: BUCKET
# Environment variable: ADMIN_TOKEN

[[d1_databases]]
binding = "DB"
database_name = "caijing-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "caijing-images"
